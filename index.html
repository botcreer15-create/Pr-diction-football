<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; text-align: center; background:#111; color:white; }
input, select, button {
  width: 90%; padding: 12px; margin: 10px; border-radius: 10px;
}
button { background: green; color: white; font-weight: bold; }
.card { background:#222; padding:15px; border-radius:10px; margin:10px; }
</style>
</head>

<body>

<h2>⚽ FIFA Predictor</h2>

<input id="team1" placeholder="Équipe 1">
<input id="team2" placeholder="Équipe 2">

<select id="competition">
<option>FIFA 25 Champions League</option>
<option>FIFA 25 England</option>
<option>FIFA 25 Spain</option>
<option>FIFA 25 5v5 Rush</option>
<option>FIFA Penalty</option>
</select>

<button onclick="predict()">PRÉDIRE</button>

<div id="result"></div>

<script>
function predict(){

let team1 = document.getElementById("team1").value
let team2 = document.getElementById("team2").value

// simulation simple
let g1 = Math.floor(Math.random()*3)
let g2 = Math.floor(Math.random()*3)

document.getElementById("result").innerHTML = `
<div class="card">
<h3>${team1} vs ${team2}</h3>
<p>⚽ Score : ${g1} - ${g2}</p>
<p>${team1}: ${Math.floor(Math.random()*60+20)}%</p>
<p>Nul: ${Math.floor(Math.random()*20)}%</p>
<p>${team2}: ${Math.floor(Math.random()*60+20)}%</p>
</div>
`
}
</script>

</body>
  </html>
